microservice-chart:
  image:
    repository: ghcr.io/pagopa/p4pa-cie
    tag: v1.0.0@sha256:8f51c08ee9f70b9953e24ba21b21122a88b0f7aa599217f9762ed39e1f9b0e08
    pullPolicy: Always

  ingress:
    host: "hub.internal.p4pa.pagopa.it"

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1024Mi"
      cpu: "1500m"

  autoscaling:
    enable: true
    minReplica: 2
    maxReplica: 4
    pollingInterval: 30 # seconds
    cooldownPeriod: 300 # seconds
    triggers:
      - type: cpu
        metadata:
          type: Utilization # Allowed types are 'Utilization' or 'AverageValue'
          value: "70"

#  envSecret:
#    CIE_ONLINE_HTTPS_TRUST_CERTIFICATES_COLLECTION: cie-online-certificate

  envConfig:
    ENV: "PROD"
    JAVA_TOOL_OPTIONS: >-
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=4
      -Djdk.virtualThreadScheduler.parallelism=4
      -Djdk.virtualThreadScheduler.maxPoolSize=256
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:ParallelGCThreads=4
      -XX:ConcGCThreads=1
      -XX:MinTLABSize=16k
      -XX:+ResizeTLAB
      -XX:+UseContainerSupport
      -XX:+ExitOnOutOfMemoryError
      -XX:+PerfDisableSharedMem
      -XX:+AlwaysPreTouch
      -XX:+UseTransparentHugePages
      -XX:NativeMemoryTracking=detail
      -Djdk.nio.maxCachedBufferSize=262144
      -Djava.security.egd=file:/dev/./urandom
      -Dspring.profiles.active=prod
      -Djava.rmi.server.hostname=127.0.0.1
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

    PAGOPA_PRINT_PAYMENT_NOTICE_CIE_BASE_URL: "https://api.platform.pagopa.it/printit/cie/pdf-engine/v1"
    PAGOPA_CREDITOR_INSTITUTIONS_BASE_URL: "https://api.platform.pagopa.it/printit/cie/api-config/v1"

    CIE_ONLINE_HTTPS_ENABLED: "true"
    CIE_ONLINE_HTTPS_TRUST_ALL: "false"
    # CIE_ONLINE_BASE_URL: "https://pagamenti.servizicie.interno.gov.it/payments-service" TODO to confirm

  keyvault:
    name: "p4pa-p-payhub-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

postman-test:
  run: false
  repoName: p4pa-cie
  dir: postman
  collectionName: "p4pa-cie-E2E.postman_collection.json"
  envVariablesFile: "p4pa_PROD.postman_environment.json" #inside azdo secure files
