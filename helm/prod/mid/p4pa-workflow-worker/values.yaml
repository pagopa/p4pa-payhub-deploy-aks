microservice-chart:
  image:
    repository: ghcr.io/pagopa/p4pa-workflow-worker
    tag: v1.0.0@sha256:4f1582e1c008883d70be0dacaf991fa381b28c913297be8f1999c1e2ce9faa40
    pullPolicy: Always

  ingress:
    host: "hub.internal.p4pa.pagopa.it"

  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1536Mi"
      cpu: "1500m"

  deployment:
    replicas: 4

  autoscaling:
    enable: false
    minReplica: 4

  envSecret:
    CIE_MAIL_SENDER_ADDRESS: aws-ses-mail-from
    CIE_MAIL_USERNAME: aws-ses-mail-smtp-username
    CIE_MAIL_PASSWORD: aws-ses-mail-smtp-password
    CIE_MAIL_HOST: aws-ses-mail-host

  envConfig:
    ENV: "PROD"
    JAVA_TOOL_OPTIONS: >-
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=4
      -Djdk.virtualThreadScheduler.parallelism=4
      -Djdk.virtualThreadScheduler.maxPoolSize=256
      -XX:InitialRAMPercentage=75.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:ParallelGCThreads=4
      -XX:ConcGCThreads=1
      -XX:MinTLABSize=16k
      -XX:+ResizeTLAB
      -XX:+UseContainerSupport
      -XX:+ExitOnOutOfMemoryError
      -XX:+PerfDisableSharedMem
      -XX:+AlwaysPreTouch
      -XX:+UseTransparentHugePages
      -XX:NativeMemoryTracking=detail
      -Djdk.nio.maxCachedBufferSize=262144
      -Djava.security.egd=file:/dev/./urandom
      -Dspring.profiles.active=prod
      -Djava.rmi.server.hostname=127.0.0.1
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json

    CIE_MAIL_SMTP_STARTTLS: "true"
    CIE_MAIL_SMTP_STARTTLS_REQUIRED: "true"

  keyvault:
    name: "p4pa-p-payhub-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"
