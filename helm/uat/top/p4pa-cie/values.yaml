microservice-chart:
  image:
    repository: ghcr.io/pagopa/p4pa-cie
    tag: uat-latest
    pullPolicy: Always

  ingress:
    host: "hub.internal.uat.p4pa.pagopa.it"

  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1024Mi"
      cpu: "1500m"

  autoscaling:
    enable: false

  envSecret:
    # switch in order to match with CIE_ONLINE_BASE_URL
    CIE_ONLINE_HTTPS_TRUST_CERTIFICATES_COLLECTION: hub-mtls-internal-uat-p4pa-pagopa-it
    # CIE_ONLINE_HTTPS_TRUST_CERTIFICATES_COLLECTION: TODO configure secret for uat

  envConfig:
    ENV: "UAT"
    JAVA_TOOL_OPTIONS: >-
      -Djava.util.concurrent.ForkJoinPool.common.parallelism=4
      -Djdk.virtualThreadScheduler.parallelism=4
      -Djdk.virtualThreadScheduler.maxPoolSize=256
      -XX:InitialRAMPercentage=60.0
      -XX:MaxRAMPercentage=85.0
      -XX:+UseG1GC
      -XX:MaxGCPauseMillis=200
      -XX:ParallelGCThreads=4
      -XX:ConcGCThreads=1
      -XX:MinTLABSize=16k
      -XX:+ResizeTLAB
      -XX:+UseContainerSupport
      -XX:+PerfDisableSharedMem
      -XX:+AlwaysPreTouch
      -XX:+UseTransparentHugePages
      -XX:NativeMemoryTracking=detail
      -Djdk.nio.maxCachedBufferSize=262144
      -XX:+ShowCodeDetailsInExceptionMessages
      -XX:+EnableDynamicAgentLoading
      -Dspring.profiles.active=dev
      -agentlib:jdwp=transport=dt_socket,server=y,address=*:8001,suspend=n
      -Dcom.sun.management.jmxremote
      -Dcom.sun.management.jmxremote.port=3002
      -Dcom.sun.management.jmxremote.rmi.port=3003
      -Dcom.sun.management.jmxremote.authenticate=false
      -Dcom.sun.management.jmxremote.ssl=false
      -Dcom.sun.management.jmxremote.local.only=false
      -Djava.rmi.server.hostname=127.0.0.1 
      -javaagent:/app/applicationinsights-agent.jar
      -Dapplicationinsights.configuration.file=/mnt/file-config-external/appinsights-config/applicationinsights.json 

    PAGOPA_PRINT_PAYMENT_NOTICE_CIE_BASE_URL: "https://api.uat.platform.pagopa.it/printit/cie/pdf-engine/v1"

    CIE_ONLINE_HTTPS_ENABLED: "true"
    CIE_ONLINE_HTTPS_TRUST_ALL: "false"

    # switch CIE_ONLINE_HTTPS_TRUST_CERTIFICATES_COLLECTION when switching CIE_ONLINE_BASE_URL
    CIE_ONLINE_BASE_URL: "https://hub-mtls.internal.uat.p4pa.pagopa.it/p4pamocks/cie"
    # CIE_ONLINE_BASE_URL: TODO cie-online service

  keyvault:
    name: "p4pa-u-payhub-kv"
    tenantId: "7788edaf-0346-4068-9d79-c868aed15b3d"

postman-test:
  run: false
  repoName: p4pa-cie
  dir: postman
  collectionName: "p4pa-cie-E2E.postman_collection.json"
  envVariablesFile: "p4pa_UAT.postman_environment.json" #inside azdo secure files
